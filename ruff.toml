# ruff.toml
# ============================================================
# Ruff 설정 — 포맷(format) + 린트(lint) 통합
#
# Ruff 는 black(포맷) + flake8/isort(린트·import 정렬)을 단일 도구로 통합한다.
# Jenkins 파이프라인의 "Code Quality" 스테이지에서 아래 두 명령으로 검사한다:
#   ruff format --check .   ← 포맷 위반 파일 검출 (수정 없이 검사만)
#   ruff check .            ← 린트 오류 검출
#
# [1차 Selenium 대응]
#   1차에서도 동일한 역할의 도구를 사용했다면 여기에 대응 내용 추가.
# ============================================================

# ── 대상 파일 ────────────────────────────────────────────────
include = ["*.py"]
exclude = [
    ".git",
    "__pycache__",
    "allure-results",
    "jmeter_report",
]

# ── Python 버전 ──────────────────────────────────────────────
target-version = "py311"

# ── 린트 규칙 ────────────────────────────────────────────────
[lint]
select = [
    "E",   # pycodestyle 오류 (들여쓰기, 공백 등)
    "F",   # pyflakes (미사용 import·변수, 정의되지 않은 이름)
    "I",   # isort (import 정렬)
    "W",   # pycodestyle 경고
]
ignore = [
    "E501",  # 한 줄 길이 제한 — 주석에서 자주 초과되므로 비활성화
]

# ── 포맷 설정 ────────────────────────────────────────────────
[format]
quote-style = "double"          # 문자열에 큰따옴표 사용
indent-style = "space"          # 들여쓰기: 스페이스
line-ending = "lf"              # 줄 끝: LF (Linux/Mac 통일)
