[pytest]
# pytest.ini
# ============================================================
# pytest 전역 설정 — 마커 등록, 실행 옵션, 리포트 경로
#
# [1차 Selenium 대응]
#   1차에도 pytest.ini 가 있었다면 동일한 역할.
#   2차에서 추가된 핵심: --strict-markers, --strict-config
# ============================================================

# ── 마커 등록 ────────────────────────────────────────────────────────
#
# pytest 는 기본적으로 알 수 없는 마커를 경고만 하고 그냥 실행한다.
# --strict-markers 를 켜면 등록되지 않은 마커를 사용할 때 에러로 처리한다.
#
# 왜 중요한가?
#   @pytest.mark.destructve  ← 오타! 'd' 하나 빠짐
#   --strict-markers 없이는 조용히 무시되고, 운영 환경 차단도 동작하지 않는다.
#   --strict-markers 있으면 즉시 에러 → 버그를 일찍 발견
#
# 마커 설명:
#   smoke       : 핵심 기능만 빠르게 검증 (배포 직후 sanity check 용)
#   regression  : 전체 기능 검증 (PR 머지 전 전체 실행)
#   destructive : 데이터를 생성·수정·삭제하는 테스트 (운영 환경 차단 대상)

markers =
    smoke: 핵심 기능만 빠르게 검증하는 테스트 (배포 후 sanity check)
    regression: 전체 기능을 검증하는 테스트 (PR 머지 전 실행)
    destructive: 데이터를 생성·수정·삭제하는 테스트 (운영 환경에서 자동 차단)

# ── 전역 실행 옵션 ───────────────────────────────────────────────────
#
# --strict-markers : 등록되지 않은 마커 사용 시 에러 (위 markers 참고)
# --strict-config  : pytest.ini 설정 오류 시 에러 (잘못된 옵션 조기 발견)
# -v               : 테스트 이름을 한 줄씩 출력 (pass/fail 한눈에 확인)
# --alluredir      : Allure 리포트용 결과 데이터 저장 경로

addopts =
    --strict-markers
    --strict-config
    -v
    --alluredir=allure-results
